<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfume</title>
</head>
<style>
    body {
        margin: 0;
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    }

    header {
        background: rgba(0, 0, 0, 0.6);
        backdrop-filter: blur(10px);
        padding: 15px 0;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
    }

    nav {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 40px;
    }

    nav a {
        text-decoration: none;
        color: #fff;
        font-size: 18px;
        letter-spacing: 1px;
        position: relative;
        padding: 10px 15px;
        transition: 0.3s;
    }

    nav a::after {
        content: "";
        position: absolute;
        left: 0;
        bottom: 0;
        width: 0%;
        height: 2px;
        background: linear-gradient(90deg, #ff7eb3, #ffd86f);
        transition: 0.4s;
    }

    nav a:hover::after {
        width: 100%;
    }

    nav a:hover {
        color: #ffd86f;
        transform: translateY(-2px);
    }

    .logo {
        position: absolute;
        left: 30px;
        top: 15px;
        font-size: 22px;
        color: #ffd86f;
        font-weight: bold;
        letter-spacing: 2px;
    }

    .menu-container {
        position: relative;
    }

    /* Dropdown */
    .dropdown {
        position: relative;
    }

    .dropdown-content {
        position: absolute;
        top: 45px;
        left: 0;
        background: rgba(0, 0, 0, 0.8);
        backdrop-filter: blur(10px);
        padding: 10px 0;
        border-radius: 10px;
        display: none;
        flex-direction: column;
        min-width: 180px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.6);
    }

    .dropdown-content a {
        padding: 10px 20px;
        font-size: 15px;
    }

    .dropdown:hover .dropdown-content {
        display: flex;
        animation: fadeIn 0.4s ease;
    }

    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: translateY(10px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
</style>

<body>
    <div class="container">
        <!-- header -->
        <header>
            <div class="menu-container">
                <div class="logo">LUX PERFUME</div>

                <nav>
                    <a href="#">Início</a>

                    <div class="dropdown">
                        <a href="#">Masculinos</a>
                        <div class="dropdown-content">
                            <a href="#">Amadeirados</a>
                            <a href="#">Cítricos</a>
                            <a href="#">Orientais</a>
                        </div>
                    </div>

                    <div class="dropdown">
                        <a href="#">Femininos</a>
                        <div class="dropdown-content">
                            <a href="#">Florais</a>
                            <a href="#">Doces</a>
                            <a href="#">Frutados</a>
                        </div>
                    </div>

                    <div class="dropdown">
                        <a href="#">Unissex</a>
                        <div class="dropdown-content">
                            <a href="#">Premium</a>
                            <a href="#">Exclusivos</a>
                        </div>
                    </div>

                    <a href="#">Lançamentos</a>
                    <a href="#">Contato</a>
                </nav>
            </div>
        </header>
        <main>

        </main>
        <footer>
            <p>Luciano Filho</p>
        </footer>
    </div>
</body>

</html>
